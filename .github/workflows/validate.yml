name: Validate skill market

on:
  pull_request:
  push:
    branches:
      - main
      - 'skill-publish/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate repository
        run: node scripts/validate-skill-market.mjs
